<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#181a26" />
      <stop offset="100%" stop-color="#08090d" />
    </radialGradient>

    <!-- Premium Gold Gradients -->
    <linearGradient id="goldLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7A35" />
      <stop offset="25%" stop-color="#EAC775" />
      <stop offset="50%" stop-color="#BE9648" />
      <stop offset="75%" stop-color="#FDF1A9" />
      <stop offset="100%" stop-color="#A1813C" />
    </linearGradient>

    <linearGradient id="goldDark" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#70531C" />
      <stop offset="50%" stop-color="#B89742" />
      <stop offset="100%" stop-color="#876627" />
    </linearGradient>

    <!-- Glow Filter for subtle depth -->
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Luxury Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g transform="translate(0, -10)">
    <!-- LOGO MARK: Stylized geometric "U" with interweaving ribbon effect -->
    <g id="logoMark" filter="url(#subtleGlow)">
      <!-- Left Wing of the "U" (Darker Gold for Shadow/Depth) -->
      <path 
        d="M 330 140 
           C 330 140, 290 145, 290 220 
           C 290 285, 335 310, 400 310 
           L 400 270 
           C 355 270, 328 250, 328 220 
           C 328 175, 355 170, 355 170 
           Z" 
        fill="url(#goldDark)" />

      <!-- Right Wing of the "U" (Lighter Gold, overlapping) -->
      <path 
        d="M 470 140 
           C 470 140, 510 145, 510 220 
           C 510 285, 465 310, 400 310 
           L 400 270 
           C 445 270, 472 250, 472 220 
           C 472 175, 445 170, 445 170 
           Z" 
        fill="url(#goldLight)" />
      
      <!-- Central Dynamic Diamond / Balance Core -->
      <path 
        d="M 400 160 
           L 415 185 
           L 400 210 
           L 385 185 Z" 
        fill="url(#goldLight)" />
    </g>

    <!-- Typography Section -->
    <!-- Main Name: USAMA -->
    <text 
      x="400" 
      y="410" 
      font-family="Montserrat, 'Helvetica Neue', 'Segoe UI', sans-serif" 
      font-size="52" 
      font-weight="900" 
      fill="url(#goldLight)" 
      letter-spacing="18" 
      text-anchor="middle">
      USAMA
    </text>

    <!-- Subtitle / Elegant divider line -->
    <line 
      x1="320" 
      y1="440" 
      x2="480" 
      y2="440" 
      stroke="url(#goldLight)" 
      stroke-width="1.5" 
      opacity="0.6" />

    <!-- Tagline: CREATIVE STUDIO -->
    <text 
      x="400" 
      y="470" 
      font-family="Montserrat, 'Helvetica Neue', 'Segoe UI', sans-serif" 
      font-size="13" 
      font-weight="500" 
      fill="#A5B1C2" 
      letter-spacing="10" 
      text-anchor="middle" 
      opacity="0.8">
      CREATIVE STUDIO
    </text>
  </g>
</svg>
